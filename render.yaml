# Render 一键部署蓝图（Blueprint）。
# 用法：把本项目推到 GitHub → Render 控制台 New + → Blueprint → 选该仓库 → Apply。
# 单服务形态：后端容器同时托管前端静态资源（同源，无需 CORS/反代）。
services:
  - type: web
    name: research-hub
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: research-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render 自动生成强随机值
      - key: STORAGE_BACKEND
        value: local                 # 免费无持久盘：上传文件重启会清空（seed/数据在 PG 里持久）
      # ---- AI（腾讯云 TokenHub，OpenAI 兼容）----
      - key: AI_PROVIDER
        value: tokenhub               # 关闭填 none
      - key: AI_BASE_URL
        value: https://tokenhub.tencentmaas.com/v1
      - key: AI_MODEL
        value: deepseek-v4-flash      # 评分/标签/总结用快模型
      - key: AI_MODEL_STRONG
        value: deepseek-v4-pro        # 代码/写作用强模型
      - key: AI_API_KEY
        sync: false                   # ★ 不写进代码；部署后在 Render 面板手填（Environment）
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SEED_ON_START
        value: "true"                # 首次自动灌入 seed 假数据；之后库非空会自动跳过
      - key: WEB_CONCURRENCY
        value: "1"                   # 免费档 512MB：单 worker 最稳；多 worker 易 OOM 重启
      - key: PYTHONPATH
        value: "/app"

databases:
  - name: research-hub-db
    plan: free                        # 1GB，注意免费 PG 30 天到期（到期前可导出/升级）
    databaseName: research_hub
    user: rhub
